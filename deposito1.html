<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet - Depositar</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="CSS/style.css">

  
</head>
<body>
  <div class="container">
    <h2>💰 Depositar</h2>

    <div class="mb-3">
      <p class="text-muted">Saldo actual: <strong id="saldoActual">$0</strong></p>
    </div>

    <form id="formDeposito">
      <div class="form-group text-start mb-3">
        <label for="depositAmount">Monto a depositar:</label>
        <input type="number" class="form-control" id="depositAmount" placeholder="Ingresa el monto">
      </div>
      <p id="montoDepositado" class="text-success fw-bold"></p>
      <div id="alert-container" class="mb-3"></div>
      <button type="submit" class="btn btn-success w-100 mb-3">✅ Realizar depósito</button>
    </form>

    <a href="menu1.html" class="btn btn-outline-secondary" style="width: 250px;">🔙 Volver al Menú</a>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="js/deposito.js"></script>
</body>
</html>
