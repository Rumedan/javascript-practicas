<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet - Enviar Dinero</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="CSS/style.css">

</head>
<body>
  <div class="container">
    <h2>📤 Enviar Dinero</h2>

    <div class="form-group mb-3">
      <label>Buscar contacto:</label>
      <input type="text" class="form-control" id="buscarContacto" placeholder="Buscar en agenda...">
    </div>

    <button id="btnAgregarContacto" class="btn btn-outline-primary w-100 mb-4" data-bs-toggle="modal" data-bs-target="#modalContacto">
  ➕ Agregar nuevo contacto
</button>
    

    <div id="mensaje-confirmacion" class="mt-3 mb-3"></div>

    <h5>👥 Contactos</h5>
    <ul id="contactList" class="list-group mb-3">
      <li class="list-group-item">
        <span class="contact-name">John Doe</span>
        <span class="contact-details">CBU: 123456789 | Alias: john.doe | ABC Bank</span>
        <button class="btn-enviar btn btn-primary btn-sm mt-2 w-100">💸 Enviar dinero</button>
      </li>
      <li class="list-group-item">
        <span class="contact-name">Jane Smith</span>
        <span class="contact-details">CBU: 987654321 | Alias: jane.smith | XYZ Bank</span>
        <button class="btn-enviar btn btn-primary btn-sm mt-2 w-100">💸 Enviar dinero</button>
      </li>
    </ul>

    <div class="text-center">
      <a href="menu1.html" class="btn btn-outline-secondary" style="width: 250px;">🔙 Volver al Menú</a>
    </div>
  </div>

  <!-- Formulario emergente -->
  <div class="modal fade" id="modalContacto" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">➕ Nuevo Contacto</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div class="form-group mb-2">
          <label>Nombre y apellido:</label>
          <input type="text" class="form-control" id="nombre" placeholder="Ej: Juan Pérez">
        </div>
        <div class="form-group mb-2">
          <label>CBU:</label>
          <input type="text" class="form-control" id="cbu" placeholder="Ej: 123456789">
        </div>
        <div class="form-group mb-2">
          <label>Alias:</label>
          <input type="text" class="form-control" id="alias" placeholder="Ej: juan.perez">
        </div>
        <div class="form-group mb-2">
          <label>Banco:</label>
          <input type="text" class="form-control" id="banco" placeholder="Ej: Banco Estado">
        </div>
        <div id="errorContacto" class="text-danger small"></div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button id="btnGuardarContacto" type="button" class="btn btn-success">✅ Guardar contacto</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/sendmoney.js"></script>
  
</body>
</html>
